            render();

            document.getElementById('exportarExcelBtn').addEventListener('click', () => {
                const wb = XLSX.utils.book_new();
                const clientesData = clientes.map(c => ({
                    ID: c.id,
                    Código: c.codigo || '', 'Razón Social': c.razonSocial, NIT: c.nit || 'C/F', Dirección: c.direccion || '',
                    Teléfono: c.telefono || '', Correo: c.correo || '', 'Fecha creación': c.fechaCreacion ? new Date(c.fechaCreacion).toLocaleString() : ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(clientesData), 'Clientes');
                const ventasData = ventas.map(v => {
                    const cli = clientes.find(c => c.id === v.clienteId) || { razonSocial: '?' };
                    return {
                        'ID Venta': v.id,
                        'ID Cliente': v.clienteId,
                        Cliente: cli.razonSocial,
                        Fecha: new Date(v.fecha).toLocaleString(),
                        Total: v.total,
                        Tipo: v.tipoVenta,
                        Productos: v.productos.map(p => `${p.unidades} ${p.producto} (Q${p.precioUnitario} c/u)`).join('; ')
                    };
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ventasData), 'Ventas');
                XLSX.writeFile(wb, 'clientes_ventas.xlsx');
            });
        }

        // --- PESTAÑA PRODUCTOS simplificada (solo nombre y precio) ---
        function renderProductos() {
            let html = `
                <h2>📦 Catálogo de productos</h2>
                <button id="nuevoProductoBtn" class="secondary">➕ Nuevo producto</button>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Nombre</th><th>Precio (Q)</th><th></th></tr></thead>
                        <tbody id="productosCatalogoBody"></tbody>
                    </table>
                </div>
            `;
            contentEl.innerHTML = html;
            const tbody = document.getElementById('productosCatalogoBody');

            function render() {
                tbody.innerHTML = '';
                catalogoProductos.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><input type="text" class="prod-nombre" value="${p.nombre}" data-id="${p.id}" style="width:100%;"></td>
                        <td><input type="number" class="prod-precio" value="${p.precioSugerido.toFixed(2)}" step="0.01" min="0" style="width:100px;"></td>
                        <td style="white-space: nowrap;">
                            <button class="secondary small guardarBtn" data-id="${p.id}">💾 Guardar</button>
                            <button class="delete-btn small eliminarBtn" data-id="${p.id}">🗑 Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.guardarBtn').forEach(b => {
                    b.addEventListener('click', () => {
                        const id = b.dataset.id;
                        const tr = b.closest('tr');
                        const nombre = tr.querySelector('.prod-nombre').value.trim();
                        const precio = parseFloat(tr.querySelector('.prod-precio').value);
                        const prod = catalogoProductos.find(p => p.id === id);
                        if (prod && nombre) {
                            prod.nombre = nombre;
                            prod.precioSugerido = precio;
                            const invItem = inventario.find(i => i.productoId === id);
                            if (invItem) {
                                invItem.nombre = nombre;
                                invItem.precioUnitario = precio;
                                // Mantener el costo anterior o calcular por defecto
                                if (invItem.costoUnitario === undefined) invItem.costoUnitario = precio * 0.7;
                            }
                            saveData();
                            alert('Producto guardado');
                        }
                    });
                });

                document.querySelectorAll('.eliminarBtn').forEach(b => {
                    b.addEventListener('click', () => {
                        const id = b.dataset.id;
                        if (confirm('¿Eliminar producto? También se eliminará del inventario.')) {
                            catalogoProductos = catalogoProductos.filter(p => p.id !== id);
                            inventario = inventario.filter(i => i.productoId !== id);
                            movimientosInventario = movimientosInventario.filter(m => m.productoId !== id);
                            saveData();
                            render();
                        }
                    });
                });
            }
            render();

            document.getElementById('nuevoProductoBtn').addEventListener('click', () => {
                const newId = generarIdProducto();
                catalogoProductos.push({ id: newId, nombre: 'Nuevo', precioSugerido: 0 });
                inventario.push({ productoId: newId, nombre: 'Nuevo', stock: 0, precioUnitario: 0, costoUnitario: 0 });
                saveData();
                render();
            });
        }

        // --- PESTAÑA INVENTARIO CON TRAZABILIDAD (sin cambios) ---
        function renderInventario() {
            let html = `
                <h2>📊 Gestión de inventario con trazabilidad</h2>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
                    <button id="ajusteManualBtn" class="secondary">➕ Ajuste manual</button>
                    <button id="reporteSemanalBtn" class="secondary">📆 Reporte semanal</button>
                    <button id="reporteMensualBtn" class="secondary">📅 Reporte mensual</button>
                    <button id="exportarInventarioBtn" class="secondary">📥 Exportar Excel</button>
                </div>
                <div id="inventarioTableContainer">
                    <table>
                        <thead><tr><th>Producto</th><th>Stock</th><th>Costo (Q)</th><th>Precio (Q)</th><th>Margen %</th><th>Valor costo (Q)</th><th>Valor venta (Q)</th><th>Ganancia potencial (Q)</th><th>Acciones</th></tr></thead>
                        <tbody id="inventarioBody"></tbody>
                    </table>
                </div>

                <div class="trazabilidad-panel">
                    <h3>🔍 Trazabilidad por producto</h3>
                    <div class="producto-selector">
                        <select id="selectorProducto" style="flex: 1;">
                            <option value="">-- Seleccione producto --</option>
                            ${catalogoProductos.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('')}
                        </select>
                        <button id="verHistorialBtn" class="secondary small">Ver historial</button>
                    </div>
                    <div id="historialProductoContainer" style="max-height: 300px; overflow-y: auto; margin-top: 10px;"></div>
                </div>

                <div class="trazabilidad-panel">
                    <h3>📅 Stock a fecha específica</h3>
                    <div class="fecha-historial">
                        <input type="date" id="fechaConsulta" value="${new Date().toISOString().slice(0,10)}">
                        <button id="consultarStockBtn" class="secondary small">Consultar</button>
                    </div>
                    <div id="stockFechaContainer" style="background: white; border-radius: 20px; padding: 12px;"></div>
                </div>

                <div class="valorizacion">
                    <span>💰 Valor inventario (costo): <span id="valorCosto">Q0.00</span></span>
                    <span>💰 Valor inventario (venta): <span id="valorVenta">Q0.00</span></span>
                    <span>📈 Ganancia potencial: <span id="gananciaPotencial">Q0.00</span></span>
                </div>

                <div id="movimientosContainer" style="margin-top: 20px;">
                    <h3>Últimos movimientos (todos)</h3>
                    <div style="max-height: 300px; overflow-y: auto;">
                        <table>
                            <thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Stock resultante</th><th>Motivo</th><th>Usuario</th><th>Documento</th></tr></thead>
                            <tbody id="movimientosBody"></tbody>
                        </table>
                    </div>
                </div>
            `;
            contentEl.innerHTML = html;

            const inventarioBody = document.getElementById('inventarioBody');
            const movimientosBody = document.getElementById('movimientosBody');
            const selectorProducto = document.getElementById('selectorProducto');
            const historialContainer = document.getElementById('historialProductoContainer');
            const fechaConsulta = document.getElementById('fechaConsulta');
            const stockFechaContainer = document.getElementById('stockFechaContainer');
            const valorCostoSpan = document.getElementById('valorCosto');
            const valorVentaSpan = document.getElementById('valorVenta');
            const gananciaPotencialSpan = document.getElementById('gananciaPotencial');

            function renderInventarioTabla() {
                inventarioBody.innerHTML = '';
                let totalCosto = 0, totalVenta = 0;
                inventario.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(item => {
                    const stockClass = item.stock < 5 ? 'stock-bajo' : '';
                    const valorCosto = item.stock * (item.costoUnitario || 0);
                    const valorVenta = item.stock * item.precioUnitario;
                    const ganancia = valorVenta - valorCosto;
                    const margen = item.costoUnitario > 0 ? ((item.precioUnitario - item.costoUnitario) / item.costoUnitario * 100).toFixed(1) : 0;
                    totalCosto += valorCosto;
                    totalVenta += valorVenta;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.nombre}</td>
                        <td class="${stockClass}">${item.stock}</td>
                        <td>${formatoQ(item.costoUnitario || 0)}</td>
                        <td>${formatoQ(item.precioUnitario)}</td>
                        <td>${margen}%</td>
                        <td>${formatoQ(valorCosto)}</td>
                        <td>${formatoQ(valorVenta)}</td>
                        <td>${formatoQ(ganancia)}</td>
                        <td>
                            <button class="secondary small ajustarBtn" data-id="${item.productoId}">✏️ Ajustar</button>
                            <button class="secondary small verHistorialBtn" data-id="${item.productoId}">📜 Historial</button>
                        </td>
                    `;
                    inventarioBody.appendChild(tr);
                });
                valorCostoSpan.innerText = formatoQ(totalCosto);
                valorVentaSpan.innerText = formatoQ(totalVenta);
                gananciaPotencialSpan.innerText = formatoQ(totalVenta - totalCosto);

                document.querySelectorAll('.ajustarBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const prodId = btn.dataset.id;
                        const item = inventario.find(i => i.productoId === prodId);
                        if (!item) return;
                        const nuevaCant = prompt(`Ajustar stock para ${item.nombre}\nStock actual: ${item.stock}\nIngresa nueva cantidad (puede ser negativa):`, item.stock);
                        if (nuevaCant === null) return;
                        const nueva = parseInt(nuevaCant);
                        if (isNaN(nueva)) { alert('Cantidad no válida'); return; }
                        const motivo = prompt('Motivo del ajuste (ej. "inventario semanal", "compra", etc.):', 'ajuste manual');
                        if (motivo === null) return;
                        const diferencia = nueva - item.stock;
                        item.stock = nueva;
                        movimientosInventario.push({
                            id: generarIdMovimiento(),
                            fecha: new Date().toISOString(),
                            productoId: item.productoId,
                            productoNombre: item.nombre,
                            tipo: 'ajuste',
                            cantidad: diferencia,
                            motivo: motivo,
                            stockResultante: nueva,
                            usuario: 'admin',
                            documento: 'Ajuste manual'
                        });
                        saveData();
                        renderInventarioTabla();
                        renderMovimientos();
                    });
                });

                document.querySelectorAll('.verHistorialBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const prodId = btn.dataset.id;
                        selectorProducto.value = prodId;
                        mostrarHistorialProducto(prodId);
                    });
                });
            }

            function mostrarHistorialProducto(prodId) {
                if (!prodId) {
                    historialContainer.innerHTML = '<p>Seleccione un producto</p>';
                    return;
                }
                const movs = movimientosInventario
                    .filter(m => m.productoId === prodId)
                    .sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                if (movs.length === 0) {
                    historialContainer.innerHTML = '<p>No hay movimientos para este producto.</p>';
                    return;
                }
                let html = '<table><thead><tr><th>Fecha</th><th>Tipo</th><th>Cantidad</th><th>Stock resultante</th><th>Motivo</th><th>Documento</th></tr></thead><tbody>';
                movs.forEach(m => {
                    const claseCant = m.cantidad > 0 ? 'movimiento-positivo' : (m.cantidad < 0 ? 'movimiento-negativo' : '');
                    html += `<tr>
                        <td>${new Date(m.fecha).toLocaleString()}</td>
                        <td>${m.tipo}</td>
                        <td class="${claseCant}">${m.cantidad > 0 ? '+' : ''}${m.cantidad}</td>
                        <td>${m.stockResultante}</td>
                        <td>${m.motivo || ''}</td>
                        <td>${m.documento || ''}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                historialContainer.innerHTML = html;
            }

            document.getElementById('verHistorialBtn').addEventListener('click', () => {
                mostrarHistorialProducto(selectorProducto.value);
            });

            function consultarStockFecha(fecha) {
                const fechaObj = new Date(fecha + 'T23:59:59');
                const stocks = {};
                inventario.forEach(item => {
                    stocks[item.productoId] = item.stock;
                });
                const movsPosteriores = movimientosInventario.filter(m => new Date(m.fecha) > fechaObj);
                movsPosteriores.forEach(m => {
                    if (stocks.hasOwnProperty(m.productoId)) {
                        stocks[m.productoId] -= m.cantidad;
                    }
                });
                return stocks;
            }

            document.getElementById('consultarStockBtn').addEventListener('click', () => {
                const fecha = fechaConsulta.value;
                if (!fecha) { alert('Seleccione una fecha'); return; }
                const stocks = consultarStockFecha(fecha);
                let html = '<table><thead><tr><th>Producto</th><th>Stock a la fecha</th></tr></thead><tbody>';
                inventario.forEach(item => {
                    const stockFecha = stocks[item.productoId] || 0;
                    html += `<tr><td>${item.nombre}</td><td>${stockFecha}</td></tr>`;
                });
                html += '</tbody></table>';
                stockFechaContainer.innerHTML = html;
            });

            function renderMovimientos() {
                movimientosBody.innerHTML = '';
                const ultimos = movimientosInventario.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 20);
                ultimos.forEach(m => {
                    const tr = document.createElement('tr');
                    const claseCant = m.cantidad > 0 ? 'movimiento-positivo' : (m.cantidad < 0 ? 'movimiento-negativo' : '');
                    tr.innerHTML = `
                        <td>${new Date(m.fecha).toLocaleString()}</td>
                        <td>${m.productoNombre}</td>
                        <td>${m.tipo}</td>
                        <td class="${claseCant}">${m.cantidad > 0 ? '+' : ''}${m.cantidad}</td>
                        <td>${m.stockResultante}</td>
                        <td>${m.motivo || ''}</td>
                        <td>${m.usuario || ''}</td>
                        <td>${m.documento || ''}</td>
                    `;
                    movimientosBody.appendChild(tr);
                });
            }

            renderInventarioTabla();
            renderMovimientos();

            document.getElementById('ajusteManualBtn').addEventListener('click', () => {
                if (catalogoProductos.length === 0) { alert('No hay productos'); return; }
                const prodSelect = catalogoProductos.map(p => `${p.nombre} (ID: ${p.id})`).join('\n');
                const prodId = prompt(`Ingresa el ID del producto (ver consola o lista):\n${prodSelect}\n\nPuedes ver los IDs en la consola (F12).`, '');
                if (!prodId) return;
                const item = inventario.find(i => i.productoId === prodId);
                if (!item) { alert('ID no válido'); return; }
                const nuevaCant = prompt(`Stock actual de ${item.nombre}: ${item.stock}\nNueva cantidad:`, item.stock);
                if (nuevaCant === null) return;
                const nueva = parseInt(nuevaCant);
                if (isNaN(nueva)) return;
                const motivo = prompt('Motivo:');
                if (motivo === null) return;
                const diferencia = nueva - item.stock;
                item.stock = nueva;
                movimientosInventario.push({
                    id: generarIdMovimiento(),
                    fecha: new Date().toISOString(),
                    productoId: item.productoId,
                    productoNombre: item.nombre,
                    tipo: 'ajuste',
                    cantidad: diferencia,
                    motivo: motivo,
                    stockResultante: nueva,
                    usuario: 'admin',
                    documento: 'Ajuste manual'
                });
                saveData();
                renderInventarioTabla();
                renderMovimientos();
            });

            function generarReportePeriodo(tipo) {
                let inicio, fin;
                const hoy = new Date();
                if (tipo === 'semana') {
                    inicio = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate() - hoy.getDay());
                    fin = new Date(inicio);
                    fin.setDate(inicio.getDate() + 6);
                } else if (tipo === 'mes') {
                    inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
                    fin = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0);
                }
                const movsPeriodo = movimientosInventario.filter(m => {
                    const fecha = new Date(m.fecha);
                    return fecha >= inicio && fecha <= fin;
                });
                let resumen = `📊 Reporte ${tipo} (${inicio.toLocaleDateString()} - ${fin.toLocaleDateString()})\n\n`;
                if (movsPeriodo.length === 0) {
                    resumen += 'No hay movimientos en este período.';
                } else {
                    movsPeriodo.forEach(m => {
                        resumen += `${new Date(m.fecha).toLocaleDateString()} - ${m.productoNombre}: ${m.cantidad > 0 ? '+' : ''}${m.cantidad} (${m.motivo})\n`;
                    });
                    const totals = {};
                    movsPeriodo.forEach(m => {
                        if (!totals[m.productoNombre]) totals[m.productoNombre] = 0;
                        totals[m.productoNombre] += m.cantidad;
                    });
                    resumen += '\n*Totales por producto:*\n';
                    for (let prod in totals) {
                        resumen += `${prod}: ${totals[prod] > 0 ? '+' : ''}${totals[prod]}\n`;
                    }
                }
                alert('Reporte generado. Revisa la consola para copiarlo (se muestra en alerta).');
                console.log(resumen);
            }

            document.getElementById('reporteSemanalBtn').addEventListener('click', () => generarReportePeriodo('semana'));
            document.getElementById('reporteMensualBtn').addEventListener('click', () => generarReportePeriodo('mes'));

            document.getElementById('exportarInventarioBtn').addEventListener('click', () => {
                const wb = XLSX.utils.book_new();
                const inventarioData = inventario.map(i => ({
                    Producto: i.nombre,
                    'Stock actual': i.stock,
                    'Costo unitario (Q)': i.costoUnitario || 0,
                    'Precio unitario (Q)': i.precioUnitario,
                    'Margen %': i.costoUnitario > 0 ? ((i.precioUnitario - i.costoUnitario) / i.costoUnitario * 100).toFixed(1) : 0,
                    'Valor costo (Q)': (i.stock * (i.costoUnitario || 0)).toFixed(2),
                    'Valor venta (Q)': (i.stock * i.precioUnitario).toFixed(2),
                    'Ganancia potencial (Q)': (i.stock * i.precioUnitario - i.stock * (i.costoUnitario || 0)).toFixed(2)
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(inventarioData), 'Inventario');
                const movimientosData = movimientosInventario.map(m => ({
                    Fecha: new Date(m.fecha).toLocaleString(),
                    Producto: m.productoNombre,
                    Tipo: m.tipo,
                    Cantidad: m.cantidad,
                    'Stock resultante': m.stockResultante,
                    Motivo: m.motivo,
                    Usuario: m.usuario,
                    Documento: m.documento
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(movimientosData), 'Movimientos');
                XLSX.writeFile(wb, 'inventario_completo.xlsx');
            });
        }

        showTab('venta');
    })();
</script>
