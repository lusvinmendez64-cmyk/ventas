                if (isNaN(monto) || monto <= 0 || monto > venta.saldoPendiente) {
                    alert('Monto no válido');
                    return;
                }
                const tipo = tipoPago.value;
                let fechaCobro = null;
                let estado = 'cobrado';

                if (tipo === 'cheque') {
                    if (radioChequeFuturo.checked) {
                        fechaCobro = document.getElementById('fechaCheque').value;
                        if (!fechaCobro) {
                            alert('Debe ingresar fecha de cobro para cheque posfechado');
                            return;
                        }
                        estado = 'pendiente';
                    } else {
                        fechaCobro = new Date().toISOString().slice(0,10);
                        estado = 'cobrado';
                    }
                }

                const nuevoAbono = {
                    id: generarIdAbono(),
                    ventaId: venta.id,
                    fecha: new Date().toISOString(),
                    monto,
                    tipoPago: tipo,
                    fechaCobro,
                    estado
                };
                abonos.push(nuevoAbono);

                venta.saldoPendiente -= monto;
                if (venta.saldoPendiente < 0) venta.saldoPendiente = 0;

                saveData();
                alert('Abono registrado');
                modal.style.display = 'none';
                if (document.querySelector('.tab.active').dataset.tab === 'ventas') renderVentasHistorial();
            });

            document.getElementById('cancelarAbonoBtn').addEventListener('click', () => {
                modal.style.display = 'none';
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.style.display = 'none';
            });
        }

        // --- PESTAÑA CATÁLOGO MEJORADA con buscador y vistas ---
        function renderCatalogo() {
            let html = `
                <h2>📇 Clientes y ventas</h2>
                ${mostrarRecordatorios()}
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button id="exportarExcelBtn" class="secondary">📥 Exportar Excel</button>
                    <button id="exportarPdfBtn" class="secondary">📄 Exportar PDF</button>
                </div>
                <div class="buscador">
                    <input type="text" id="buscarClienteCatalogo" placeholder="Buscar por nombre o código...">
                </div>
                <div class="sub-tabs">
                    <div class="sub-tab active" data-vista="todos">Todos</div>
                    <div class="sub-tab" data-vista="credito">Crédito</div>
                    <div class="sub-tab" data-vista="contado">Contado</div>
                </div>
                <div id="contenedorClientes"></div>
                <div id="paginacionClientesCatalogo" class="paginacion" style="margin-top:20px;"></div>
            `;
            contentEl.innerHTML = html;

            const contenedor = document.getElementById('contenedorClientes');
            const paginacionDiv = document.getElementById('paginacionClientesCatalogo');
            const buscarInput = document.getElementById('buscarClienteCatalogo');
            const subTabs = document.querySelectorAll('.sub-tab');
            const exportarPdfBtn = document.getElementById('exportarPdfBtn');

            let vistaActual = 'todos';
            let paginaActual = 0;
            const itemsPorPagina = 5;
            let clientesFiltrados = [];

            function tieneSaldoPendiente(clienteId) {
                return ventas.some(v => v.clienteId === clienteId && v.tipoVenta === 'Crédito' && v.saldoPendiente > 0);
            }

            function filtrarClientes() {
                const termino = buscarInput.value.toLowerCase().trim();
                let base = clientes;

                if (vistaActual === 'credito') {
                    base = clientes.filter(c => tieneSaldoPendiente(c.id));
                } else if (vistaActual === 'contado') {
                    base = clientes.filter(c => !tieneSaldoPendiente(c.id));
                }

                if (termino) {
                    clientesFiltrados = base.filter(c => 
                        c.razonSocial.toLowerCase().includes(termino) || 
                        (c.codigo && c.codigo.toLowerCase().includes(termino))
                    );
                } else {
                    clientesFiltrados = [...base];
                }

                paginaActual = 0;
                render();
            }

            function render() {
                const inicio = paginaActual * itemsPorPagina;
                const fin = inicio + itemsPorPagina;
                const clientesPagina = clientesFiltrados.slice(inicio, fin);

                if (clientesPagina.length === 0) {
                    contenedor.innerHTML = '<p>No hay clientes en esta categoría.</p>';
                } else {
                    let out = '';
                    clientesPagina.sort((a,b) => (a.codigo || '').localeCompare(b.codigo || '')).forEach(cli => {
                        const ventasCliente = ventas.filter(v => v.clienteId === cli.id);
                        const totalCliente = ventasCliente.reduce((acc, v) => acc + (parseFloat(v.total)||0), 0);
                        const saldoPendiente = ventasCliente.reduce((acc, v) => acc + (v.tipoVenta === 'Crédito' ? (v.saldoPendiente || 0) : 0), 0);
                        out += `
                            <fieldset style="margin-bottom:20px;">
                                <legend>${cli.razonSocial} ${cli.codigo ? '· '+cli.codigo : '(sin código)'}</legend>
                                <div>NIT: ${cli.nit || 'C/F'}</div>

        // --- Función para mostrar estado de cuenta en modal (sin cambios) ---
        function mostrarEstadoCuenta(clienteId) {
            const cliente = clientes.find(c => c.id === clienteId);
            if (!cliente) return;

            const ventasCliente = ventas.filter(v => v.clienteId === clienteId).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
            const abonosCliente = abonos.filter(a => ventasCliente.some(v => v.id === a.ventaId));

            let html = `
                <h3>Estado de cuenta: ${cliente.razonSocial}</h3>
                <p>NIT: ${cliente.nit || 'C/F'} | Código: ${cliente.codigo || '—'}</p>
                <h4>Facturas pendientes</h4>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Fecha</th><th>Total</th><th>Saldo</th><th>Vencimiento</th><th>Días</th></tr></thead>
                        <tbody>
            `;
            let totalPendiente = 0;
            ventasCliente.forEach(v => {
                if (v.tipoVenta === 'Crédito' && v.saldoPendiente > 0) {
                    totalPendiente += v.saldoPendiente;
                    const venc = new Date(v.fechaVencimiento);
                    const hoy = new Date();
                    const diasRest = Math.ceil((venc - hoy) / (1000*60*60*24));
                    const clase = diasRest < 0 ? 'vencido' : (diasRest <= 3 ? 'proximo' : '');
                    html += `<tr class="${clase}"><td>${new Date(v.fecha).toLocaleDateString()}</td><td>${formatoQ(v.total)}</td><td>${formatoQ(v.saldoPendiente)}</td><td>${venc.toLocaleDateString()}</td><td>${diasRest}</td></tr>`;
                }
            });
            html += `</tbody></table></div>`;
            html += `<p><strong>Total pendiente: ${formatoQ(totalPendiente)}</strong></p>`;

            html += `<h4>Abonos realizados</h4>`;
            if (abonosCliente.length === 0) {
                html += '<p>No hay abonos registrados.</p>';
            } else {
                html += `<div class="table-responsive"><table><thead><tr><th>Fecha</th><th>Factura</th><th>Monto</th><th>Tipo</th><th>Cheque fecha</th><th>Estado</th></tr></thead><tbody>`;
                abonosCliente.forEach(a => {
                    const venta = ventas.find(v => v.id === a.ventaId);
                    html += `<tr><td>${new Date(a.fecha).toLocaleDateString()}</td><td>${venta ? venta.id.substr(0,8) : ''}</td><td>${formatoQ(a.monto)}</td><td>${a.tipoPago}</td><td>${a.fechaCobro ? new Date(a.fechaCobro).toLocaleDateString() : '—'}</td><td>${a.estado || 'cobrado'}</td></tr>`;
                });
                html += `</tbody></table></div>`;
            }

            html += `
                <h4>Registrar nuevo abono</h4>
                <div>
                    <label>Factura: <select id="abonoVentaId">
                        ${ventasCliente.filter(v => v.tipoVenta === 'Crédito' && v.saldoPendiente > 0).map(v => `<option value="${v.id}">${new Date(v.fecha).toLocaleDateString()} - Q${v.saldoPendiente.toFixed(2)}</option>`).join('')}
                    </select></label>
                    <label>Monto: <input type="number" id="abonoMonto" step="0.01" min="0.01"></label>
                    <label>Tipo de pago: 
                        <select id="abonoTipoPago">
                            <option value="efectivo">Efectivo</option>
                            <option value="cheque">Cheque</option>
                        </select>
                    </label>
                    <div id="chequeOpcionesModal" style="display:none; margin-top:10px;">
                        <div class="flex-row">
                            <label class="checkbox-label"><input type="radio" name="chequeTipoModal" value="hoy" checked> Cheque del día</label>
                            <label class="checkbox-label"><input type="radio" name="chequeTipoModal" value="futuro"> Cheque posfechado</label>
                        </div>
                        <div id="fechaChequeModalContainer" style="display:none;">
                            <label>Fecha de cobro: <input type="date" id="fechaChequeModal"></label>
                        </div>
                    </div>
                    <button id="guardarAbonoModalBtn" class="secondary small">Guardar abono</button>
                </div>
            `;

            const modal = document.getElementById('estadoCuentaModal');
            const modalContent = document.getElementById('estadoCuentaContent');
            modalContent.innerHTML = html;
            modal.style.display = 'flex';

            const tipoPago = document.getElementById('abonoTipoPago');
            const chequeOpciones = document.getElementById('chequeOpcionesModal');
            const fechaChequeContainer = document.getElementById('fechaChequeModalContainer');
            const radioHoy = document.querySelector('input[name="chequeTipoModal"][value="hoy"]');
            const radioFuturo = document.querySelector('input[name="chequeTipoModal"][value="futuro"]');

            tipoPago.addEventListener('change', () => {
                if (tipoPago.value === 'cheque') {
                    chequeOpciones.style.display = 'block';
                } else {
                    chequeOpciones.style.display = 'none';
                }
            });

            radioHoy.addEventListener('change', () => {
                fechaChequeContainer.style.display = 'none';
            });
            radioFuturo.addEventListener('change', () => {
                fechaChequeContainer.style.display = 'block';
            });

            document.getElementById('guardarAbonoModalBtn').addEventListener('click', () => {
                const ventaId = document.getElementById('abonoVentaId').value;
                const monto = parseFloat(document.getElementById('abonoMonto').value);
                const tipo = tipoPago.value;
                if (!ventaId || isNaN(monto) || monto <= 0) {
                    alert('Seleccione una factura y monto válido');
                    return;
                }
                const venta = ventas.find(v => v.id === ventaId);
                if (!venta) return;
                if (monto > venta.saldoPendiente) {
                    alert('El monto no puede ser mayor al saldo pendiente');
                    return;
                }

                let fechaCobro = null;
                let estado = 'cobrado';
                if (tipo === 'cheque') {
                    if (radioFuturo.checked) {
                        fechaCobro = document.getElementById('fechaChequeModal').value;
                        if (!fechaCobro) {
                            alert('Debe ingresar fecha de cobro para cheque posfechado');
                            return;
                        }
                        estado = 'pendiente';
                    } else {
                        fechaCobro = new Date().toISOString().slice(0,10);
                        estado = 'cobrado';
                    }
                }

                const nuevoAbono = {
                    id: generarIdAbono(),
                    ventaId,
                    fecha: new Date().toISOString(),
                    monto,
                    tipoPago: tipo,
                    fechaCobro,
                    estado
                };
                abonos.push(nuevoAbono);

                venta.saldoPendiente -= monto;
                if (venta.saldoPendiente < 0) venta.saldoPendiente = 0;

                saveData();
                alert('Abono registrado');
                modal.style.display = 'none';
                if (document.querySelector('.tab.active').dataset.tab === 'catalogo') renderCatalogo();
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.style.display = 'none';
            });
        }

        // --- PESTAÑA PRODUCTOS ---
        function renderProductos() {
            let html = `
                <h2>📦 Catálogo de productos</h2>
                ${mostrarRecordatorios()}
                <button id="nuevoProductoBtn" class="secondary">➕ Nuevo producto</button>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Nombre</th><th>Precio (Q)</th><th></th></tr></thead>
                        <tbody id="productosCatalogoBody"></tbody>
                    </table>
                </div>
            `;
            contentEl.innerHTML = html;
            const tbody = document.getElementById('productosCatalogoBody');

            function render() {
                tbody.innerHTML = '';
                catalogoProductos.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><input type="text" class="prod-nombre" value="${p.nombre}" data-id="${p.id}" style="width:100%;"></td>
                        <td><input type="number" class="prod-precio" value="${p.precioSugerido.toFixed(2)}" step="0.01" min="0" style="width:100px;"></td>
                        <td style="white-space: nowrap;">
                            <button class="secondary small guardarBtn" data-id="${p.id}">💾 Guardar</button>
                            <button class="delete-btn small eliminarBtn" data-id="${p.id}">🗑 Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.guardarBtn').forEach(b => {
                    b.addEventListener('click', () => {
                        const id = b.dataset.id;
                        const tr = b.closest('tr');
                        const nombre = tr.querySelector('.prod-nombre').value.trim();
                        const precio = parseFloat(tr.querySelector('.prod-precio').value);
                        const prod = catalogoProductos.find(p => p.id === id);
                        if (prod && nombre) {
                            prod.nombre = nombre;
                            prod.precioSugerido = precio;
                            const invItem = inventario.find(i => i.productoId === id);
                            if (invItem) {
                                invItem.nombre = nombre;
                                invItem.precioUnitario = precio;
                                if (invItem.costoUnitario === undefined) invItem.costoUnitario = precio * 0.7;
                            }
                            saveData();
                            alert('Producto guardado');
                        }
                    });
                });

                document.querySelectorAll('.eliminarBtn').forEach(b => {
                    b.addEventListener('click', () => {
                        const id = b.dataset.id;
                        if (confirm('¿Eliminar producto? También se eliminará del inventario.')) {
                            catalogoProductos = catalogoProductos.filter(p => p.id !== id);
                            inventario = inventario.filter(i => i.productoId !== id);
                            movimientosInventario = movimientosInventario.filter(m => m.productoId !== id);
                            saveData();
                            render();
                        }
                    });
                });
            }
            render();

            document.getElementById('nuevoProductoBtn').addEventListener('click', () => {
                const newId = generarIdProducto();
                catalogoProductos.push({ id: newId, nombre: 'Nuevo', precioSugerido: 0 });
                inventario.push({ productoId: newId, nombre: 'Nuevo', stock: 0, precioUnitario: 0, costoUnitario: 0 });
                saveData();
                render();
            });
        }

        // --- PESTAÑA INVENTARIO con comisión y reportes mejorados ---
        function renderInventario() {
            const hoy = new Date();
            const mesActual = hoy.getMonth();
            const anioActual = hoy.getFullYear();

            // Ventas que entran en comisión: contado + créditos con saldo 0 (totalmente pagados)
            const ventasComision = ventas.filter(v => {
                const fecha = new Date(v.fecha);
                if (fecha.getMonth() !== mesActual || fecha.getFullYear() !== anioActual) return false;
                if (v.tipoVenta === 'Contado') return true;
                if (v.tipoVenta === 'Crédito' && v.saldoPendiente === 0) return true;
                return false;
            });
            const totalVentasComision = ventasComision.reduce((acc, v) => acc + (parseFloat(v.total) || 0), 0);

            // Todas las ventas del mes (para otros reportes)
            const todasVentasMes = ventas.filter(v => {
                const fecha = new Date(v.fecha);
                return fecha.getMonth() === mesActual && fecha.getFullYear() === anioActual;
            });
            const totalVentasMes = todasVentasMes.reduce((acc, v) => acc + (parseFloat(v.total) || 0), 0);

            // 🔹 NUEVO: Calcular movimientos por producto en la semana actual (lunes a viernes) y mes actual (desde 1 hasta hoy)
            const diaSemana = hoy.getDay(); // 0 domingo, 1 lunes, ..., 6 sábado
            const diff = diaSemana === 0 ? 6 : diaSemana - 1; // días a restar para llegar al lunes
            const lunes = new Date(hoy);
            lunes.setDate(hoy.getDate() - diff);
            lunes.setHours(0,0,0,0);
            const viernes = new Date(lunes);
            viernes.setDate(lunes.getDate() + 4);
            viernes.setHours(23,59,59,999);
            const finSemana = hoy < viernes ? hoy : viernes; // si hoy es antes del viernes, usamos hoy; si hoy es después (sáb/dom), usamos viernes

            const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
            inicioMes.setHours(0,0,0,0);
            const finMes = hoy; // hasta hoy inclusive

            // Variables para acumular ventas y recargas separadas
            let ventasSemana = {};
            let recargasSemana = {};
            let ventasMes = {};
            let recargasMes = {};

            movimientosInventario.forEach(m => {
                const fechaMov = new Date(m.fecha);
                const prodId = m.productoId;
                const cantidad = m.cantidad || 0;
                // Ventas (cantidad negativa)
                if (m.tipo === 'venta') {
                    if (fechaMov >= lunes && fechaMov <= finSemana) {
                        ventasSemana[prodId] = (ventasSemana[prodId] || 0) + Math.abs(cantidad);
                    }
                    if (fechaMov >= inicioMes && fechaMov <= finMes) {
                        ventasMes[prodId] = (ventasMes[prodId] || 0) + Math.abs(cantidad);
                    }
                }
                // Recargas (ajustes positivos)
                if (m.tipo === 'ajuste' && cantidad > 0) {
                    if (fechaMov >= lunes && fechaMov <= finSemana) {
                        recargasSemana[prodId] = (recargasSemana[prodId] || 0) + cantidad;
                    }
                    if (fechaMov >= inicioMes && fechaMov <= finMes) {
                        recargasMes[prodId] = (recargasMes[prodId] || 0) + cantidad;
                    }
                }
            });

            let html = `
                <h2>📊 Inventario y comisiones</h2>
                ${mostrarRecordatorios()}
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
                    <button id="ajusteManualBtn" class="secondary">➕ Ajuste manual</button>
                    <button id="exportarInventarioBtn" class="secondary">📥 Exportar Excel</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Producto</th><th>Stock</th><th>Precio (Q)</th><th>Mov. semana</th><th>Mov. mes</th><th>Acciones</th></tr></thead>
                        <tbody id="inventarioBody"></tbody>
                    </table>
                </div>

                <div class="valorizacion">
                    <span>💰 Valor inventario (venta): <span id="valorInventario">Q0.00</span></span>
                    <span>📅 Ventas del mes (total): <span id="ventasMesTotal">${formatoQ(totalVentasMes)}</span></span>
                    <span style="display: flex; align-items: center; gap: 8px;">
                        Comisión (solo contado + créditos pagados): 
                        <input type="number" id="porcentajeComision" class="comision-input" value="4" min="0" max="100" step="0.1"> %
                        = <span id="montoComision">Q0.00</span>
                        (Base: <span id="baseComision">${formatoQ(totalVentasComision)}</span>)
                    </span>
                </div>

                <div class="trazabilidad-panel">
                    <h3>🔍 Trazabilidad por producto</h3>
                    <div class="producto-selector">
                        <select id="selectorProducto" style="flex: 1;">
                            <option value="">-- Seleccione producto --</option>
                            ${catalogoProductos.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('')}
                        </select>
                        <button id="verHistorialBtn" class="secondary small">Ver historial</button>
                    </div>
                    <div id="historialProductoContainer" style="max-height: 300px; overflow-y: auto; margin-top: 10px;"></div>
                </div>

                <div id="movimientosContainer" style="margin-top: 20px;">
                    <h3>Últimos movimientos</h3>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Stock resultante</th><th>Motivo</th></tr></thead>
                            <tbody id="movimientosBody"></tbody>
                        </table>
                    </div>
                </div>
            `;
            contentEl.innerHTML = html;

            const inventarioBody = document.getElementById('inventarioBody');
            const movimientosBody = document.getElementById('movimientosBody');
            const selectorProducto = document.getElementById('selectorProducto');
            const historialContainer = document.getElementById('historialProductoContainer');
            const valorInventarioSpan = document.getElementById('valorInventario');
            const ventasMesTotalSpan = document.getElementById('ventasMesTotal');
            const baseComisionSpan = document.getElementById('baseComision');
            const porcentajeInput = document.getElementById('porcentajeComision');
            const montoComisionSpan = document.getElementById('montoComision');

            function actualizarComision() {
                const base = parseFloat(baseComisionSpan.innerText.replace('Q', '')) || 0;
                const porcentaje = parseFloat(porcentajeInput.value) || 0;
                const comision = base * porcentaje / 100;
                montoComisionSpan.innerText = formatoQ(comision);
            }

            function renderInventarioTabla() {
                inventarioBody.innerHTML = '';
                let totalValorVenta = 0;
                inventario.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(item => {
                    const stockClass = item.stock < 5 ? 'stock-bajo' : '';
                    const valorVenta = item.stock * item.precioUnitario;
                    totalValorVenta += valorVenta;
                    // Movimiento neto (para columna)
                    const movSem = (ventasSemana[item.productoId] || 0) - (recargasSemana[item.productoId] || 0);
                    const movM = (ventasMes[item.productoId] || 0) - (recargasMes[item.productoId] || 0);
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.nombre}</td>
                        <td class="${stockClass}">${item.stock}</td>
                        <td>${formatoQ(item.precioUnitario)}</td>
                        <td>${movSem > 0 ? '+' : ''}${movSem}</td>
                        <td>${movM > 0 ? '+' : ''}${movM}</td>
                        <td>
                            <button class="secondary small ajustarBtn" data-id="${item.productoId}">✏️ Ajustar</button>
                            <button class="secondary small verHistorialBtn" data-id="${item.productoId}">📜 Historial</button>
                        </td>
                    `;
                    inventarioBody.appendChild(tr);
                });
                valorInventarioSpan.innerText = formatoQ(totalValorVenta);
                actualizarComision();

                document.querySelectorAll('.ajustarBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const prodId = btn.dataset.id;
                        const item = inventario.find(i => i.productoId === prodId);
                        if (!item) return;
                        const nuevaCant = prompt(`Ajustar stock para ${item.nombre}\nStock actual: ${item.stock}\nIngresa nueva cantidad (puede ser negativa):`, item.stock);
                        if (nuevaCant === null) return;
                        const nueva = parseInt(nuevaCant);
                        if (isNaN(nueva)) { alert('Cantidad no válida'); return; }
                        const motivo = prompt('Motivo del ajuste:', 'ajuste manual');
                        if (motivo === null) return;
                        const diferencia = nueva - item.stock;
                        item.stock = nueva;
                        movimientosInventario.push({
                            id: generarIdMovimiento(),
                            fecha: new Date().toISOString(),
                            productoId: item.productoId,
                            productoNombre: item.nombre,
                            tipo: 'ajuste',
                            cantidad: diferencia,
                            motivo: motivo,
                            stockResultante: nueva,
                            usuario: 'admin',
                            documento: 'Ajuste manual'
                        });
                        saveData();
                        renderInventarioTabla();
                        renderMovimientos();
                    });
                });

                document.querySelectorAll('.verHistorialBtn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const prodId = btn.dataset.id;
                        selectorProducto.value = prodId;
                        mostrarHistorialProducto(prodId);
                    });
                });
            }

            // 🔹 NUEVA FUNCIÓN: Exportar historial de un producto a PDF
            function exportarHistorialProductoPDF(prodId) {
                const producto = catalogoProductos.find(p => p.id === prodId);
                if (!producto) return;
                const itemInv = inventario.find(i => i.productoId === prodId);
                const stockActual = itemInv ? itemInv.stock : 0;

                const hoy = new Date();
                const diaSemana = hoy.getDay();
                const diff = diaSemana === 0 ? 6 : diaSemana - 1;
                const lunes = new Date(hoy);
                lunes.setDate(hoy.getDate() - diff);
                lunes.setHours(0,0,0,0);
                const viernes = new Date(lunes);
                viernes.setDate(lunes.getDate() + 4);
                viernes.setHours(23,59,59,999);
                const finSemana = hoy < viernes ? hoy : viernes;
                const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
                inicioMes.setHours(0,0,0,0);
                const finMes = hoy;

                const movs = movimientosInventario
                    .filter(m => m.productoId === prodId)
                    .sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

                const movsSemana = movs.filter(m => new Date(m.fecha) >= lunes && new Date(m.fecha) <= finSemana);
                const movsMes = movs.filter(m => new Date(m.fecha) >= inicioMes && new Date(m.fecha) <= finMes);

                // Totales por tipo en semana y mes
                const ventasSemana = movsSemana.filter(m => m.tipo === 'venta').reduce((acc, m) => acc + Math.abs(m.cantidad), 0);
                const recargasSemana = movsSemana.filter(m => m.tipo === 'ajuste' && m.cantidad > 0).reduce((acc, m) => acc + m.cantidad, 0);
                const netoSemana = movsSemana.reduce((acc, m) => acc + m.cantidad, 0);

                const ventasMes = movsMes.filter(m => m.tipo === 'venta').reduce((acc, m) => acc + Math.abs(m.cantidad), 0);
                const recargasMes = movsMes.filter(m => m.tipo === 'ajuste' && m.cantidad > 0).reduce((acc, m) => acc + m.cantidad, 0);
                const netoMes = movsMes.reduce((acc, m) => acc + m.cantidad, 0);

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                doc.setFontSize(16);
                doc.text(`Historial de ${producto.nombre}`, 14, 16);
                doc.setFontSize(11);
                doc.text(`Stock actual: ${stockActual}`, 14, 24);
                doc.text(`Periodo semana (lunes a ${finSemana === viernes ? 'viernes' : 'hoy'}): ${lunes.toLocaleDateString()} - ${finSemana.toLocaleDateString()}`, 14, 32);
                doc.text(`Periodo mes: ${inicioMes.toLocaleDateString()} - ${finMes.toLocaleDateString()}`, 14, 40);

                // Resumen semana
                doc.text(`Resumen semana: Ventas: ${ventasSemana}, Recargas: ${recargasSemana}, Neto: ${netoSemana}`, 14, 48);

                // Tabla de movimientos en la semana
                if (movsSemana.length > 0) {
                    doc.text('Movimientos en la semana:', 14, 56);
                    const semanaRows = movsSemana.map(m => [
                        new Date(m.fecha).toLocaleString(),
                        m.tipo,
                        m.cantidad,
                        m.stockResultante,
                        m.motivo || ''
                    ]);
                    doc.autoTable({
                        startY: 60,
                        head: [['Fecha', 'Tipo', 'Cantidad', 'Stock', 'Motivo']],
                        body: semanaRows,
                        margin: { left: 14 },
                        styles: { fontSize: 8 }
                    });
                } else {
                    doc.text('No hay movimientos en la semana.', 14, 56);
                }

                // Resumen mes
                let finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 10 : 70;
                doc.text(`Resumen mes: Ventas: ${ventasMes}, Recargas: ${recargasMes}, Neto: ${netoMes}`, 14, finalY);
                finalY += 6;

                // Tabla de movimientos en el mes
                if (movsMes.length > 0) {
                    doc.text('Movimientos en el mes:', 14, finalY);
                    const mesRows = movsMes.map(m => [
                        new Date(m.fecha).toLocaleString(),
                        m.tipo,
                        m.cantidad,
                        m.stockResultante,
                        m.motivo || ''
                    ]);
                    doc.autoTable({
                        startY: finalY + 4,
                        head: [['Fecha', 'Tipo', 'Cantidad', 'Stock', 'Motivo']],
                        body: mesRows,
                        margin: { left: 14 },
                        styles: { fontSize: 8 }
                    });
                } else {
                    doc.text('No hay movimientos en el mes.', 14, finalY);
                }

                doc.save(`historial_${producto.nombre.replace(/\s+/g, '_')}.pdf`);
            }

            function mostrarHistorialProducto(prodId) {
                if (!prodId) {
                    historialContainer.innerHTML = '<p>Seleccione un producto</p>';
                    return;
                }
                const movs = movimientosInventario
                    .filter(m => m.productoId === prodId)
                    .sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                if (movs.length === 0) {
                    historialContainer.innerHTML = '<p>No hay movimientos para este producto.</p>';
                    return;
                }

                // Calcular resumen para mostrar en el panel
                const hoy = new Date();
                const diaSemana = hoy.getDay();
                const diff = diaSemana === 0 ? 6 : diaSemana - 1;
                const lunes = new Date(hoy);
                lunes.setDate(hoy.getDate() - diff);
                lunes.setHours(0,0,0,0);
                const viernes = new Date(lunes);
                viernes.setDate(lunes.getDate() + 4);
                viernes.setHours(23,59,59,999);
                const finSemana = hoy < viernes ? hoy : viernes;
                const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
                inicioMes.setHours(0,0,0,0);
                const finMes = hoy;

                const movsSemana = movs.filter(m => new Date(m.fecha) >= lunes && new Date(m.fecha) <= finSemana);
                const movsMes = movs.filter(m => new Date(m.fecha) >= inicioMes && new Date(m.fecha) <= finMes);

                const ventasSemana = movsSemana.filter(m => m.tipo === 'venta').reduce((acc, m) => acc + Math.abs(m.cantidad), 0);
                const recargasSemana = movsSemana.filter(m => m.tipo === 'ajuste' && m.cantidad > 0).reduce((acc, m) => acc + m.cantidad, 0);
                const ventasMes = movsMes.filter(m => m.tipo === 'venta').reduce((acc, m) => acc + Math.abs(m.cantidad), 0);
                const recargasMes = movsMes.filter(m => m.tipo === 'ajuste' && m.cantidad > 0).reduce((acc, m) => acc + m.cantidad, 0);

                let html = `
                    <div style="background: #e8f5e9; padding: 10px; border-radius: 20px; margin-bottom: 10px;">
                        <strong>Resumen semana:</strong> Ventas: ${ventasSemana} | Recargas: ${recargasSemana}<br>
                        <strong>Resumen mes:</strong> Ventas: ${ventasMes} | Recargas: ${recargasMes}
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>Fecha</th><th>Tipo</th><th>Cantidad</th><th>Stock resultante</th><th>Motivo</th></tr></thead>
                            <tbody>
                `;
                movs.forEach(m => {
                    const claseCant = m.cantidad > 0 ? 'movimiento-positivo' : (m.cantidad < 0 ? 'movimiento-negativo' : '');
                    html += `<tr>
                        <td>${new Date(m.fecha).toLocaleString()}</td>
                        <td>${m.tipo}</td>
                        <td class="${claseCant}">${m.cantidad > 0 ? '+' : ''}${m.cantidad}</td>
                        <td>${m.stockResultante}</td>
                        <td>${m.motivo || ''}</td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                // Agregar botón para exportar PDF
                html += `<div style="margin-top: 10px;"><button class="secondary small" id="exportarHistorialPDF">📄 Exportar PDF</button></div>`;
                historialContainer.innerHTML = html;

                document.getElementById('exportarHistorialPDF')?.addEventListener('click', () => {
                    exportarHistorialProductoPDF(prodId);
                });
            }

            document.getElementById('verHistorialBtn').addEventListener('click', () => {
                mostrarHistorialProducto(selectorProducto.value);
            });

            function renderMovimientos() {
                movimientosBody.innerHTML = '';
                const ultimos = movimientosInventario.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 20);
                ultimos.forEach(m => {
                    const tr = document.createElement('tr');
                    const claseCant = m.cantidad > 0 ? 'movimiento-positivo' : (m.cantidad < 0 ? 'movimiento-negativo' : '');
                    tr.innerHTML = `
                        <td>${new Date(m.fecha).toLocaleString()}</td>
                        <td>${m.productoNombre}</td>
                        <td>${m.tipo}</td>
                        <td class="${claseCant}">${m.cantidad > 0 ? '+' : ''}${m.cantidad}</td>
                        <td>${m.stockResultante}</td>
                        <td>${m.motivo || ''}</td>
                    `;
                    movimientosBody.appendChild(tr);
                });
            }

            renderInventarioTabla();
            renderMovimientos();

            porcentajeInput.addEventListener('input', actualizarComision);

            document.getElementById('ajusteManualBtn').addEventListener('click', () => {
                if (catalogoProductos.length === 0) { alert('No hay productos'); return; }
                const prodSelect = catalogoProductos.map(p => `${p.nombre} (ID: ${p.id})`).join('\n');
                const prodId = prompt(`Ingresa el ID del producto:\n${prodSelect}`, '');
                if (!prodId) return;
                const item = inventario.find(i => i.productoId === prodId);
                if (!item) { alert('ID no válido'); return; }
                const nuevaCant = prompt(`Stock actual de ${item.nombre}: ${item.stock}\nNueva cantidad:`, item.stock);
                if (nuevaCant === null) return;
                const nueva = parseInt(nuevaCant);
                if (isNaN(nueva)) return;
                const motivo = prompt('Motivo:');
                if (motivo === null) return;
                const diferencia = nueva - item.stock;
                item.stock = nueva;
                movimientosInventario.push({
                    id: generarIdMovimiento(),
                    fecha: new Date().toISOString(),
                    productoId: item.productoId,
                    productoNombre: item.nombre,
                    tipo: 'ajuste',
                    cantidad: diferencia,
                    motivo: motivo,
                    stockResultante: nueva,
                    usuario: 'admin',
                    documento: 'Ajuste manual'
                });
                saveData();
                renderInventarioTabla();
                renderMovimientos();
            });

            document.getElementById('exportarInventarioBtn').addEventListener('click', () => {
                const wb = XLSX.utils.book_new();
                const inventarioData = inventario.map(i => ({
                    Producto: i.nombre,
                    Stock: i.stock,
                    'Precio unitario (Q)': i.precioUnitario,
                    'Ventas semana': ventasSemana[i.productoId] || 0,
                    'Recargas semana': recargasSemana[i.productoId] || 0,
                    'Ventas mes': ventasMes[i.productoId] || 0,
                    'Recargas mes': recargasMes[i.productoId] || 0
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(inventarioData), 'Inventario');
                const movimientosData = movimientosInventario.map(m => ({
                    Fecha: new Date(m.fecha).toLocaleString(),
                    Producto: m.productoNombre,
                    Tipo: m.tipo,
                    Cantidad: m.cantidad,
                    'Stock resultante': m.stockResultante,
                    Motivo: m.motivo
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(movimientosData), 'Movimientos');
                XLSX.writeFile(wb, 'inventario.xlsx');
            });
        }

        showTab('venta');
    })();
</script>
</body>
</html>
